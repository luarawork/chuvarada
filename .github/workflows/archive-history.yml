name: Archive History to B2

# Move risk_scores mais antigos que 48h do Supabase pro Backblaze B2
# (comprimido, particionado por data/estado) e gera o snapshot agregado do
# dia anterior -- ver scripts/archive_to_b2.ts.
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx tsx scripts/archive_to_b2.ts
        env:
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
          B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
