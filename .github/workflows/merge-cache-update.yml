name: Update MERGE Cache

# Roda scripts/fetch_merge_cptec.py de hora em hora — ver
# scripts/README_merge.md para detalhes de operação/fallback.
#
# Dependências corrigidas em relação ao pedido original: o script só
# importa rasterio, numpy, requests e pg8000 (driver Postgres puro-Python
# — psycopg2 não é usado). "supabase" e "geopandas" não são necessários
# aqui (esse não é o pipeline de pré-processamento geoespacial, que usa
# geopandas separadamente).
#
# Requer o secret SUPABASE_CONNECTION_STRING no repositório.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install rasterio numpy requests pg8000
      - run: python scripts/fetch_merge_cptec.py
        env:
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
