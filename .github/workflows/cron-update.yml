name: Update Risk Scores

# Agendador independente de plataforma de deploy (funciona mesmo sem Vercel/Netlify
# configurados, ou como redundância a eles). Requer os secrets do repositório:
#   CRON_SECRET — o mesmo valor de CRON_SECRET usado no .env.local/produção
#   APP_URL     — URL pública do app (ex: https://chuvarada.vercel.app)
on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cron de risco
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 570 \
            "${{ secrets.APP_URL }}/api/cron/update"
